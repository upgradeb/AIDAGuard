# Aidaguard 配置文件
# 复制此文件为 config.toml 并填入实际值
# 所有字段均为可选，未设置时使用默认值。

# 本地监听端口
# port = 19000

# YAML 规则文件目录
# rules_dir = "./rules"

# 日志级别: trace, debug, info, warn, error
# log_level = "info"

# 请求体最大大小（MB），超出返回 413
# max_body_size_mb = 10

[storage]
# 是否启用审计记录持久化
enabled = false
# 数据库文件路径
# db_path = "./data/aidaguard.db"
# 加密密钥（可选，不设置使用内置默认密钥）
# encryption_key = "your-secret-key"

# 上游 LLM 接入通过桌面应用的「大模型接入」页面管理，
# 也可直接在此配置（示例）：
# [[upstreams]]
# name = "example"
# url = "https://api.example.com/v1/chat/completions"
# api_key = "sk-..."
# default = true
# timeout_secs = 300
# models = ["gpt-4"]
