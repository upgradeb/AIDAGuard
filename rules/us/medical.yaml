version: '1.0'
name: United States Medical Rules
description: HIPAA-covered healthcare data patterns for the US
rules:
  - id: medical_record_no
    name: Medical Record Number
    pattern: 'MR\d{6,10}'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [HIPAA]

  - id: diagnosis_code
    name: ICD Diagnosis Code
    pattern: '(?-u:\b)[A-Z]\d{2}(?:\.\d{1,4})?(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [HIPAA]

  - id: blood_pressure
    name: Blood Pressure Reading
    pattern: '(?-u:\b)\d{2,3}/\d{2,3}\s*(?:mmHg|毫米汞柱)?(?-u:\b)'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 60
    compliance: [HIPAA]

  - id: drug_prescription
    name: Drug Prescription
    pattern: '(?:处方|用药|剂量|服用)[：:]\s*[一-龥\w]+'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [HIPAA]
