version: '1.0'
name: China Region Rules (PIPL)
description: Personal information patterns governed by China's Personal Information Protection Law
rules:
  - id: phone_cn
    name: Chinese Phone Number
    pattern: '1[3-9]\d{9}'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PIPL]

  - id: id_card_cn
    name: Chinese ID Card
    pattern: '\d{17}[\dXx]'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PIPL]

  - id: bank_card
    name: Bank Card Number
    pattern: '(?-u:\b)\d{16,19}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PIPL]

  - id: car_plate_cn
    name: Chinese Car Plate
    pattern: '(?-u:\b)[京津沪渝冀豫云辽黑湘皖鲁新苏浙赣鄂桂甘晋蒙陕吉闽贵粤川青藏琼宁][A-Z][A-Z0-9]{4,5}[A-Z0-9挂学警港澳](?-u:\b)'
    enabled: true
    strategy: mask
    mode: detect
    priority: 80
    compliance: [PIPL]

  - id: passport_cn
    name: Chinese Passport Number
    pattern: '(?-u:\b)[EGeg]\d{8}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [PIPL]

  - id: person_name_cn
    name: Chinese Person Name
    pattern: '(?:姓名|名字|称呼)[：:]\s*[一-龥]{2,4}'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [PIPL]

  - id: address_cn
    name: Chinese Address
    pattern: '(?:地址|住址|所在地)[：:]\s*[一-龥0-9\w\-号路街巷弄栋座单元楼室层]+'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [PIPL]

  - id: company_name_cn
    name: Chinese Company Name
    pattern: '[一-龥]{2,}(?:有限公司|有限责任公司|股份有限公司|集团)'
    enabled: true
    strategy: mask
    mode: detect
    priority: 70
    compliance: [PIPL]

  - id: amount_cny
    name: Amount (CNY)
    pattern: '(?:¥|CNY\s?|RMB\s?|元)?\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?\s*(?:元|块)?'
    enabled: true
    strategy: mask
    mode: detect
    priority: 70
    compliance: [PIPL]

  - id: date_of_birth
    name: Date of Birth
    pattern: '(?:出生|生日|生于)[：:]\s*\d{4}[-/年]\d{1,2}[-/月]\d{1,2}'
    enabled: true
    strategy: mask
    mode: detect
    priority: 80
    compliance: [PIPL]

  - id: date_ymd
    name: Date (YMD Format)
    pattern: '(?-u:\b)\d{4}[-/年]\d{1,2}[-/月]\d{1,2}(?:日)?(?-u:\b)'
    enabled: false
    strategy: mask
    mode: detect
    priority: 50
    compliance: [PIPL]

  - id: nationality_cn
    name: Ethnicity Information
    pattern: '(?:民族|族别)[：:]\s*(?:汉|蒙古|回|藏|维吾尔|苗|彝|壮|布依|朝鲜|满|侗|瑶|白|土家|哈尼|哈萨克|傣|黎|傈僳|佤|畲|高山|拉祜|水|东乡|纳西|景颇|柯尔克孜|土|达斡尔|仫佬|羌|布朗|撒拉|毛南|仡佬|锡伯|阿昌|普米|塔吉克|怒|乌孜别克|俄罗斯|鄂温克|德昂|保安|裕固|京|塔塔尔|独龙|鄂伦春|赫哲|门巴|珞巴|基诺)'
    enabled: false
    strategy: mask
    mode: detect
    priority: 60
    compliance: [PIPL]

  - id: age_number
    name: Age Number
    pattern: '(?:年龄|岁数)[：:]\s*\d{1,3}'
    enabled: false
    strategy: mask
    mode: detect
    priority: 40
    compliance: [PIPL]

  - id: education_cn
    name: Education Level
    pattern: '(?:学历|学位|毕业)[：:]\s*(?:博士|硕士|本科|大专|中专|高中|初中|小学|研究生|学士|MBA|EMBA)'
    enabled: false
    strategy: mask
    mode: detect
    priority: 50
    compliance: [PIPL]

  - id: occupation_cn
    name: Occupation
    pattern: '(?:职业|职位|工作|岗位)[：:]\s*[一-龥\w]+'
    enabled: false
    strategy: mask
    mode: detect
    priority: 50
    compliance: [PIPL]

  - id: religion_hint
    name: Religion Hint
    pattern: '(?:宗教|信仰)[：:]\s*[一-龥]+'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [PIPL]
