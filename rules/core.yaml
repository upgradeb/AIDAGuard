version: '1.0'
name: Core Rules
description: Global baseline — credentials, identifiers, and financial instruments

rules:
  # ── Credentials ──────────────────────────────────────────────────────

  - id: api_key
    name: API Key
    pattern: '(?:sk|pk|api|key|token|secret|pat)[-_][A-Za-z0-9]{16,64}'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]
    context_words: [key, token, secret, api]
    base_confidence: 0.4
    region: global

  - id: aws_access_key
    name: AWS Access Key
    pattern: '(?-u:\b)AKIA[0-9A-Z]{16}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]
    context_words: [aws, access, key]
    base_confidence: 0.7
    region: global

  - id: github_token
    name: GitHub Token
    pattern: '(?-u:\b)(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36,255}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]
    context_words: [github, token, ghp]
    base_confidence: 0.8
    region: global

  - id: basic_auth_header
    name: Basic Auth Header
    pattern: '(?:Authorization|authorization)\s*:\s*Basic\s+[A-Za-z0-9+/=]+'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [SOC2, ISO_27001]
    base_confidence: 0.7
    region: global

  - id: bearer_token
    name: Bearer Token
    pattern: '(?:Authorization|authorization)\s*:\s*Bearer\s+[A-Za-z0-9\-._~+/=]+'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [SOC2, ISO_27001]
    context_words: [bearer, authorization, token]
    base_confidence: 0.7
    region: global

  - id: db_connection_string
    name: Database Connection String
    pattern: '(?:jdbc|mongodb|mysql|postgres|postgresql|sqlite|redis|mssql)://[^\s]+'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]
    base_confidence: 0.8
    region: global

  - id: slack_webhook
    name: Slack Webhook URL
    pattern: 'https://hooks\.slack\.com/services/T[a-zA-Z0-9_]+/B[a-zA-Z0-9_]+/[a-zA-Z0-9_]+'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]
    base_confidence: 0.9
    region: global

  - id: google_api_key
    name: Google API Key
    pattern: '(?-u:\b)AIza[0-9A-Za-z\-_]{35}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [SOC2, ISO_27001]
    context_words: [google, api, key]
    base_confidence: 0.8
    region: global

  - id: stripe_key
    name: Stripe Key
    pattern: '(?-u:\b)(?:sk|pk)_(?:test|live)_[A-Za-z0-9]{24,99}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PCI_DSS]
    context_words: [stripe, api, key]
    base_confidence: 0.8
    region: global

  - id: generic_secret
    name: Generic Secret Assignment
    pattern: '(?:SECRET|secret|PASSWORD|password|TOKEN|token|KEY|key)\s*[:=]\s*[^\s]{8,}'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [SOC2, ISO_27001]
    base_confidence: 0.4
    region: global

  - id: private_key_pem
    name: PEM Private Key
    pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]
    base_confidence: 0.9
    region: global

  - id: jwt_token
    name: JWT Token
    pattern: '(?-u:\b)eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]
    context_words: [jwt, token, bearer]
    base_confidence: 0.7
    region: global

  # ── Identifiers ──────────────────────────────────────────────────────

  - id: email
    name: Email Address
    pattern: '[\w.+-]+@[\w-]+\.\w+'
    exclude: '@\d+x\.(?:png|jpg|jpeg|gif|svg|webp|ico|pdf)\b'
    enabled: true
    strategy: mask
    mode: detect
    priority: 90
    compliance: [GDPR, PIPL, CCPA]
    context_words: [email, mail, 邮箱, 联系]
    base_confidence: 0.5
    region: global

  - id: ipv4
    name: IPv4 Address
    pattern: '(?-u:\b)(?:\d{1,3}\.){3}\d{1,3}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [GDPR, PIPL, CCPA]
    context_words: [ip, address, 地址, server]
    base_confidence: 0.4
    region: global

  - id: ipv6
    name: IPv6 Address
    pattern: '(?-u:\b)(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [GDPR, PIPL, CCPA]
    context_words: [ip, ipv6, address]
    base_confidence: 0.5
    region: global

  - id: mac_address
    name: MAC Address
    pattern: '(?-u:\b)(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 70
    compliance: [GDPR, PIPL, CCPA]
    context_words: [mac, address, device]
    base_confidence: 0.5
    region: global

  - id: url
    name: URL
    pattern: 'https?://(?:www\.)?[-a-zA-Z0-9@:%._+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}\b(?:[-a-zA-Z0-9()@:%_+.~#?&/=]*)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 70
    compliance: [GDPR, PIPL, CCPA]
    base_confidence: 0.4
    region: global

  # ── Financial ────────────────────────────────────────────────────────

  - id: bank_card_strict
    name: Bank Card (Strict BIN)
    pattern: '(?-u:\b)(?:62|60|64|4[0-9]|5[1-5]|3[47])\d{14,17}(?-u:\b)'
    validator: luhn
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PCI_DSS]
    context_words: [card, credit, 银行卡, 卡号, visa, mastercard]
    base_confidence: 0.4
    region: global

  - id: swift_code
    name: SWIFT/BIC Code
    pattern: '(?-u:\b)[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [PCI_DSS, AML]
    context_words: [swift, bic, bank]
    base_confidence: 0.4
    region: global

  - id: iban
    name: IBAN
    pattern: '(?-u:\b)[A-Z]{2}\d{2}[A-Z0-9]{11,30}(?-u:\b)'
    validator: iban
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [GDPR, PSD2]
    context_words: [iban, account, bank]
    base_confidence: 0.3
    region: global
