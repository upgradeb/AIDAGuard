version: '1.0'
name: European Union Financial Rules
description: EU-specific financial data patterns under GDPR/PSD2
rules:
  - id: amount_eur
    name: Amount (EUR)
    pattern: '(?:€|EUR\s?)\s?\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?'
    enabled: false
    strategy: mask
    mode: detect
    priority: 70
    compliance: [GDPR, PSD2]
