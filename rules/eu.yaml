version: '1.0'
name: EU Region Rules
description: PII patterns under GDPR and PSD2

rules:
  # ── Finance ──────────────────────────────────────────────────────────

  - id: amount_eur
    name: Amount (EUR)
    pattern: '(?:€|EUR\s?)\s?\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?'
    enabled: true
    strategy: mask
    mode: detect
    priority: 70
    compliance: [PSD2]
    base_confidence: 0.5
    region: eu
