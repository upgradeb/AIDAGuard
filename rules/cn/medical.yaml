version: '1.0'
name: China Medical Rules
description: Medical and health-related patterns applicable in China under PIPL
rules:
  - id: patient_name_hint
    name: Patient Name Hint
    pattern: '(?:患者|病人|就诊人|体检人)[：:]\s*[一-龥]{2,4}'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [PIPL, HIPAA]

  - id: medical_term_icd
    name: Medical Term (ICD Related)
    pattern: '(?:诊断|确诊|疑似|既往史|现病史|主诉)[：:]\s*[一-龥\w，,、\s]+'
    enabled: true
    strategy: mask
    mode: detect
    priority: 70
    compliance: [PIPL]

  - id: hospital_name
    name: Hospital Name
    pattern: '[一-龥]{2,}(?:医院|卫生院|诊所|保健院|急救中心|疾控中心)'
    enabled: true
    strategy: mask
    mode: detect
    priority: 70
    compliance: [PIPL]
