version: "1.0"
name: "金融场景规则"
description: "适用于金融、支付场景的敏感数据规则"

rules:
  - id: bank_card_strict
    name: "银行卡号（严格）"
    pattern: '\b(?:62|60|64)\d{14,17}\b'
    enabled: true
    strategy: placeholder
    priority: 100

  - id: swift_code
    name: "SWIFT 代码"
    pattern: '\b[A-Z]{4}[A-Z]{2}(?=[A-Z0-9]*\d)[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'
    enabled: true
    strategy: placeholder
    priority: 90

  - id: amount_cny
    name: "金额（人民币）"
    pattern: '(?:¥|CNY\s?)\d+(?:\.\d{1,2})?'
    enabled: false
    strategy: mask
    priority: 70
