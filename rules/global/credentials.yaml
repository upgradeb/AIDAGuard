version: '1.0'
name: Secrets and Credentials
description: API keys, tokens, private keys, and secret material
rules:
  - id: api_key
    name: API Key
    pattern: '(?:sk|pk|api|key|token|secret|pat)[-_][A-Za-z0-9]{16,64}'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]

  - id: aws_access_key
    name: AWS Access Key
    pattern: '(?-u:\b)AKIA[0-9A-Z]{16}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]

  - id: aws_secret_key
    name: AWS Secret Key
    pattern: '(?-u:\b)(?<![A-Za-z0-9/+])[A-Za-z0-9/+]{40}(?![A-Za-z0-9/+])(?-u:\b)'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]

  - id: github_token
    name: GitHub Token
    pattern: '(?-u:\b)(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36,255}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]

  - id: basic_auth_header
    name: Basic Auth Header
    pattern: '(?:Authorization|authorization)\s*:\s*Basic\s+[A-Za-z0-9+/=]+'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [SOC2, ISO_27001]

  - id: bearer_token
    name: Bearer Token
    pattern: '(?:Authorization|authorization)\s*:\s*Bearer\s+[A-Za-z0-9\-._~+/=]+'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [SOC2, ISO_27001]

  - id: db_connection_string
    name: Database Connection String
    pattern: '(?:jdbc|mongodb|mysql|postgres|postgresql|sqlite|redis|mssql)://[^\s]+'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]

  - id: slack_webhook
    name: Slack Webhook URL
    pattern: 'https://hooks\.slack\.com/services/T[a-zA-Z0-9_]+/B[a-zA-Z0-9_]+/[a-zA-Z0-9_]+'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]

  - id: google_api_key
    name: Google API Key
    pattern: '(?-u:\b)AIza[0-9A-Za-z\-_]{35}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [SOC2, ISO_27001]

  - id: stripe_key
    name: Stripe Key
    pattern: '(?-u:\b)(?:sk|pk)_(?:test|live)_[A-Za-z0-9]{24,99}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PCI_DSS]

  - id: telegram_bot_token
    name: Telegram Bot Token
    pattern: '(?-u:\b)\d{9,10}:[A-Za-z0-9\-_]{35}(?-u:\b)'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [SOC2, ISO_27001]

  - id: generic_secret
    name: Generic Secret Assignment
    pattern: '(?:SECRET|secret|PASSWORD|password|TOKEN|token|KEY|key)\s*[:=]\s*[^\s]{8,}'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [SOC2, ISO_27001]

  - id: private_key_pem
    name: PEM Private Key
    pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]

  - id: ssh_private_key_path
    name: SSH Private Key Path
    pattern: '(?:~|/home|/Users)/[^\s]*\.ssh/[^\s]*'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 70
    compliance: [SOC2, ISO_27001]
