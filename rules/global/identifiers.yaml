version: '1.0'
name: Universal Digital Identifiers
description: Borderless digital identifiers applicable in all jurisdictions
rules:
  - id: email
    name: Email Address
    pattern: '[\w.+-]+@[\w-]+\.\w+'
    exclude: '@\d+x\.(?:png|jpg|jpeg|gif|svg|webp|ico|pdf)\b'
    enabled: true
    strategy: mask
    mode: detect
    priority: 90
    compliance: [GDPR, PIPL, CCPA]

  - id: ipv4
    name: IPv4 Address
    pattern: '(?-u:\b)(?:\d{1,3}\.){3}\d{1,3}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [GDPR]

  - id: ipv6
    name: IPv6 Address
    pattern: '(?-u:\b)(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [GDPR]

  - id: mac_address
    name: MAC Address
    pattern: '(?-u:\b)(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 70
    compliance: [GDPR]

  - id: url
    name: URL
    pattern: 'https?://(?:www\.)?[-a-zA-Z0-9@:%._+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}\b(?:[-a-zA-Z0-9()@:%_+.~#?&/=]*)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 70
    compliance: [GDPR]

  - id: jwt_token
    name: JWT Token
    pattern: '(?-u:\b)eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [SOC2, ISO_27001]
