version: '1.0'
name: Global Financial Instruments
description: Payment cards, IBAN, SWIFT, and cryptocurrency addresses
rules:
  - id: bank_card_strict
    name: Bank Card (Strict BIN)
    pattern: '(?-u:\b)(?:62|60|64|4[0-9]|5[1-5]|35|37)\d{14,17}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PCI_DSS]

  - id: swift_code
    name: SWIFT/BIC Code
    pattern: '(?-u:\b)[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 90
    compliance: [PCI_DSS, AML]

  - id: iban
    name: IBAN
    pattern: '(?-u:\b)[A-Z]{2}\d{2}[A-Z0-9]{11,30}(?-u:\b)'
    enabled: true
    strategy: placeholder
    mode: detect
    priority: 80
    compliance: [GDPR]

  - id: amount_usd
    name: Amount (USD)
    pattern: '\$\s?\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?'
    enabled: false
    strategy: mask
    mode: detect
    priority: 70
    compliance: [PCI_DSS]

  - id: credit_card_visa
    name: Visa Credit Card
    pattern: '(?-u:\b)4[0-9]{12}(?:[0-9]{3})?(?-u:\b)'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PCI_DSS]

  - id: credit_card_mastercard
    name: Mastercard Credit Card
    pattern: '(?-u:\b)5[1-5][0-9]{14}(?-u:\b)'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PCI_DSS]

  - id: credit_card_amex
    name: Amex Credit Card
    pattern: '(?-u:\b)3[47][0-9]{13}(?-u:\b)'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 100
    compliance: [PCI_DSS]

  - id: crypto_btc
    name: Bitcoin Address
    pattern: '(?-u:\b)[13][a-km-zA-HJ-NP-Z1-9]{25,34}(?-u:\b)'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 60
    compliance: [AML]

  - id: crypto_eth
    name: Ethereum Address
    pattern: '(?-u:\b)0x[a-fA-F0-9]{40}(?-u:\b)'
    enabled: false
    strategy: placeholder
    mode: detect
    priority: 60
    compliance: [AML]
